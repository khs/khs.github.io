name: Update Oil Futures Data

on:
  schedule:
    # Mon–Fri at 21:00 UTC (after NYSE close at 4pm ET)
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance requests pandas openpyxl xlrd

      - name: Diagnose environment
        continue-on-error: true
        run: |
          python - <<'EOF'
          import sys, pandas as pd
          print("Python:", sys.version)
          print("pandas:", pd.__version__)
          try:
              import xlrd; print("xlrd:", xlrd.__version__)
          except ImportError: print("xlrd: NOT INSTALLED")
          try:
              import openpyxl; print("openpyxl:", openpyxl.__version__)
          except ImportError: print("openpyxl: NOT INSTALLED")
          import requests, io
          url = "https://www.eia.gov/dnav/pet/hist_xls/RWTCd.xls"
          r = requests.get(url, timeout=30)
          print(f"EIA RWTC fetch: HTTP {r.status_code}, {len(r.content)} bytes, content-type: {r.headers.get('content-type')}")
          df = pd.read_excel(io.BytesIO(r.content), sheet_name="Data 1", skiprows=2, header=0)
          print(f"  Parsed OK: {len(df)} rows, cols: {list(df.columns[:3])}")
          EOF

      - name: Fetch futures data
        run: python .github/scripts/fetch_oil_futures.py
        continue-on-error: true

      - name: Build empirical lag model (crude → pump pass-through)
        run: python .github/scripts/build_lag_model.py
        continue-on-error: true   # FRED sometimes slow; don't block the rest

      - name: Run backtest (weekly refresh keeps it current)
        run: python .github/scripts/backtest_oil.py
        continue-on-error: true   # EIA XLS endpoint occasionally flaky

      - name: Check pipeline results (fail job if any script silently failed)
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path
          from datetime import datetime, timezone, timedelta

          errors = []
          now = datetime.now(timezone.utc)

          checks = {
              "oil-futures.json":  ("last_updated", 8),
              "lag-model.json":    ("generated",    8),
              "oil-backtest.json": ("generated",    8),
          }
          for fname, (ts_key, max_days) in checks.items():
              path = Path("data") / fname
              if not path.exists():
                  errors.append(f"MISSING: {fname}")
                  continue
              try:
                  data = json.loads(path.read_text())
                  ts = data.get(ts_key)
                  if not ts:
                      errors.append(f"NO TIMESTAMP in {fname}")
                  else:
                      dt  = datetime.fromisoformat(ts.replace("Z", "+00:00"))
                      age = now - dt
                      if age.days > max_days:
                          errors.append(f"STALE ({age.days}d old): {fname}")
              except Exception as e:
                  errors.append(f"PARSE ERROR in {fname}: {e}")

          # Error artifacts written by scripts on failure
          for ef in ["data/futures-error.json", "data/lag-model-debug.json"]:
              if Path(ef).exists():
                  errors.append(f"ERROR ARTIFACT present: {ef}")

          # Warn if EIA_API_KEY is absent (won't fail, but worth noting)
          import os
          if not os.environ.get("EIA_API_KEY"):
              print("::warning::EIA_API_KEY not set — falling back to public XLS endpoints")

          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)
          else:
              print("All pipeline outputs are fresh and parseable.")
          EOF

      - name: Regenerate self-contained widgets
        run: |
          python - <<'EOF'
          import re, json

          with open('data/oil-futures.json') as f:
              oil = json.load(f)
          with open('data/lag-model.json') as f:
              lag_full = json.load(f)

          lag = {
              'alpha':             lag_full['alpha'],
              'betas':             lag_full['betas'],
              'r2':                lag_full['r2'],
              'seasonal_premium':  lag_full['seasonal_premium'],
              'total_passthrough': lag_full['total_passthrough'],
              'band_passthrough':  lag_full['band_passthrough'],
          }

          oil_json = json.dumps(oil, separators=(',', ':'))
          lag_json = json.dumps(lag, separators=(',', ':'))

          for fname in ['self-contained/chart.html', 'self-contained/cost.html']:
              with open(fname) as f:
                  content = f.read()
              content = re.sub(r'oilData = \{.*?\};', f'oilData = {oil_json};', content)
              content = re.sub(r'lagModel = \{.*?\};', f'lagModel = {lag_json};', content)
              with open(fname, 'w') as f:
                  f.write(content)
              print(f'Updated {fname}')
          EOF

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/ self-contained/
          git diff --cached --quiet || git commit -m "chore: update oil data [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
