name: Update Oil Futures Data

on:
  schedule:
    # Every Sunday at 18:00 UTC (after markets close Friday)
    - cron: '0 18 * * 0'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance requests pandas openpyxl xlrd

      - name: Diagnose environment
        continue-on-error: true
        run: |
          python - <<'EOF'
          import sys, pandas as pd
          print("Python:", sys.version)
          print("pandas:", pd.__version__)
          try:
              import xlrd; print("xlrd:", xlrd.__version__)
          except ImportError: print("xlrd: NOT INSTALLED")
          try:
              import openpyxl; print("openpyxl:", openpyxl.__version__)
          except ImportError: print("openpyxl: NOT INSTALLED")
          import requests, io
          url = "https://www.eia.gov/dnav/pet/hist_xls/RWTCd.xls"
          r = requests.get(url, timeout=30)
          print(f"EIA RWTC fetch: HTTP {r.status_code}, {len(r.content)} bytes, content-type: {r.headers.get('content-type')}")
          df = pd.read_excel(io.BytesIO(r.content), sheet_name="Data 1", skiprows=2, header=0)
          print(f"  Parsed OK: {len(df)} rows, cols: {list(df.columns[:3])}")
          EOF

      - name: Fetch futures data
        run: python .github/scripts/fetch_oil_futures.py
        continue-on-error: true

      - name: Build empirical lag model (crude → pump pass-through)
        run: python .github/scripts/build_lag_model.py
        continue-on-error: true   # FRED sometimes slow; don't block the rest

      - name: Run backtest (weekly refresh keeps it current)
        run: python .github/scripts/backtest_oil.py
        continue-on-error: true   # EIA XLS endpoint occasionally flaky

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/
          git diff --cached --quiet || git commit -m "chore: update oil data [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
